<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — AlphaX Heros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Rajdhani", sans-serif;
        background: #020408;
        color: #e2e8f0;
      }
      h1,
      .font-display {
        font-family: "Orbitron", monospace;
      }
      .font-mono-tech {
        font-family: "Share Tech Mono", monospace;
      }
      .grad-text {
        background: linear-gradient(135deg, #00d4ff, #7c3aed, #00ff88);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .glass {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(0, 212, 255, 0.15);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
      }
      .form-input {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(0, 212, 255, 0.2);
        color: #e2e8f0;
        transition: all 0.3s;
        font-family: "Rajdhani", sans-serif;
      }
      .form-input:focus {
        outline: none;
        border-color: #00d4ff;
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
        background: rgba(0, 212, 255, 0.05);
      }
      .form-input::placeholder {
        color: rgba(226, 232, 240, 0.3);
      }
      .btn-primary {
        background: linear-gradient(135deg, #00d4ff, #0099cc);
        color: #020408;
        font-family: "Orbitron", monospace;
        font-weight: 700;
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
      }
      .btn-primary:hover {
        box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        transform: translateY(-1px);
      }
      .alert-success {
        background: rgba(0, 255, 136, 0.1);
        border: 1px solid rgba(0, 255, 136, 0.3);
        color: #00ff88;
      }
      .alert-error {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
      }
      .grid-bg {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
        background-size: 60px 60px;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center px-4">
    <div class="grid-bg"></div>

    <div class="relative z-10 w-full max-w-md">
      <!-- Logo -->
      <div class="text-center mb-10">
        <div
          class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4 bg-grad-blue-purple"
        >
          <svg
            class="w-8 h-8 text-white"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              fill-rule="evenodd"
              d="M18 8a6 6 0 01-7.743 5.743L10 14l-1 1-1 1H6v2H2v-4l4.257-4.257A6 6 0 1118 8zm-6-4a1 1 0 100 2 2 2 0 012 2 1 1 0 102 0 4 4 0 00-4-4z"
              clip-rule="evenodd"
            />
          </svg>
        </div>
        <h1 class="font-display text-2xl font-black grad-text">ALPHAX HEROS</h1>
        <p class="font-mono-tech text-xs text-slate-600 mt-1">
          // ADMIN PORTAL ACCESS
        </p>
      </div>

      <!-- Flash Messages -->
      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div class="mb-6 space-y-2">
        {% for cat, msg in messages %}
        <div class="alert-{{ cat }} rounded-xl px-4 py-3 text-sm font-semibold">
          {{ msg }}
        </div>
        {% endfor %}
      </div>
      {% endif %} {% endwith %}

      <!-- Card -->
      <div class="glass rounded-3xl p-8">
        <h2 class="font-display text-xl font-bold text-white mb-1">
          Admin Login
        </h2>
        <p class="text-slate-500 text-sm mb-8">Authorized personnel only.</p>

        <form method="POST" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-slate-300 mb-2"
              >Username</label
            >
            <input
              type="text"
              name="username"
              required
              autocomplete="username"
              placeholder="Enter username"
              class="form-input w-full rounded-xl px-4 py-3 text-sm"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-300 mb-2"
              >Password</label
            >
            <input
              type="password"
              name="password"
              required
              autocomplete="current-password"
              placeholder="Enter password"
              class="form-input w-full rounded-xl px-4 py-3 text-sm"
            />
          </div>
          <button
            type="submit"
            class="btn-primary w-full py-3 rounded-xl text-sm mt-2"
          >
            ACCESS DASHBOARD →
          </button>
        </form>
      </div>

      <div class="text-center mt-6">
        <a
          href="/"
          class="font-mono-tech text-xs text-slate-700 hover:text-cyan-700 transition-colors"
          >[← BACK TO SITE]</a
        >
      </div>
    </div>
  </body>
</html>
